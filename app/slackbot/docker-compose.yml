# DynamoDB Local — the local replacement for the AWS DynamoDB tables
# that the Serverless `resources` block would normally provision.
#
#   docker compose up -d     # start
#   docker compose down      # stop (data is in-memory and is dropped)
#
# Data lives under ./.dynamodb so it survives restarts.
services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: drop-squat-dynamodb
    ports:
      - '8000:8000'
    command: '-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data'
    working_dir: /home/dynamodblocal
    volumes:
      - ./.dynamodb:/home/dynamodblocal/data
